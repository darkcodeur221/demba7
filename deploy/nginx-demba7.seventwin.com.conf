# Nginx reverse proxy for the portfolio.
# Copy to /etc/nginx/sites-available/demba7.seventwin.com then:
#   sudo ln -s /etc/nginx/sites-available/demba7.seventwin.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Then run certbot (see DEPLOY.md) to add HTTPS automatically.

server {
    listen 80;
    listen [::]:80;
    server_name demba7.seventwin.com;

    # Cache the immutable hashed build assets aggressively.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3007;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3007;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
